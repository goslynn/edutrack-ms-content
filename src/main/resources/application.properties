# =============================================================================
# Content Service — arbol jerarquico configurable + archivos (schema content)
# =============================================================================

# ── Datasource (credenciales exclusivas al schema `content`) ─────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:content_user}
quarkus.datasource.password=${DB_PASSWORD:content_pass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:edutrack}

# ── Hibernate: DDL gestionado exclusivamente por Flyway ──────────────────────
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.default-schema=content

# Dev valida que el mapeo JPA coincide exactamente con el DDL de Flyway.
%dev.quarkus.hibernate-orm.database.generation=validate
%dev.quarkus.hibernate-orm.log.sql=true

# ── Flyway ───────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=content
quarkus.flyway.default-schema=content
quarkus.flyway.create-schemas=true
quarkus.flyway.locations=classpath:db/migration

# ── Auth proactiva deshabilitada: la identidad llega como cabeceras internas ──
quarkus.http.auth.proactive=false

# ── Service discovery (commons): override local para docker-compose ──────────
%dev.edutrack.discovery.pattern={service}:8080

# ── Interpretacion de cabeceras internas del Gateway (RequestContext) ────────
edutrack.headers.validation.mode=EAGER

# ── Exposicion de stack trace en el body de errores (GlobalExceptionMappers) ─
edutrack.errors.expose-stacktrace=false

# ── Almacenamiento de archivos (Strategy; v1 FileSystem sobre volumen persistente)
# Directorio raiz del backend FileSystem. En Docker/Fly.io mapea a un volumen para
# que los archivos sobrevivan reinicios. En dev nativo usa un dir local.
edutrack.content.storage.fs.root=${CONTENT_STORAGE_DIR:/data/content}
%dev.edutrack.content.storage.fs.root=${CONTENT_STORAGE_DIR:target/content-storage}

# Tamano maximo por archivo: 500 MB (BE-CNT-004). 500 * 1024 * 1024 = 524288000.
edutrack.content.max-file-size-bytes=524288000

# ── Descarga: token firmado y expirante (equivalente a URL pre-firmada) ──────
# Secreto de firma HMAC del token de descarga. SECRETO: overridear en prod por env.
edutrack.content.download.secret=${CONTENT_DOWNLOAD_SECRET:dev-content-download-secret}
# Vigencia del enlace de descarga (ISO-8601 Duration).
edutrack.content.download.ttl=PT10M

# ── Limite de body HTTP: sobre el max de archivo para que el 413 lo emita el
# dominio (envelope ErrorResponse) y no el runtime. 510 MB. ──────────────────
quarkus.http.limits.max-body-size=510M

# ── OpenAPI / Swagger UI bajo /content (contrato del Gateway: 1er segmento) ──
quarkus.smallrye-openapi.info-title=Content MS API
quarkus.smallrye-openapi.info-version=1.0.0-SNAPSHOT
quarkus.smallrye-openapi.info-description=EduTrack - Arbol de contenido configurable + archivos (Strategy FileSystem)
quarkus.smallrye-openapi.path=/content/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/content/q/swagger-ui
quarkus.swagger-ui.title=EduTrack Content Service API

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."cl.duocuc.edutrack".level=DEBUG
